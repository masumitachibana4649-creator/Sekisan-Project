<div class="room-line">
  <input name="room_name" value="{{ name }}" placeholder="部屋名">
  <input name="perimeter_m" value="{{ perimeter }}" type="number" step="0.01" min="0">
  <input name="height_m" value="{{ height }}" type="number" step="0.01" min="0">
  <input name="opening_area_m2" value="{{ opening }}" type="number" step="0.01" min="0">
  <input name="ceiling_area_m2" value="{{ ceiling }}" type="number" step="0.01" min="0">
  <input name="note" value="{{ note }}" placeholder="任意">
</div>
