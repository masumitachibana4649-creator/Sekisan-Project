services:
  - type: web
    name: wallpaper-estimator
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn wallpaper_estimator.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.9
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wallpaper-estimator-db
          property: connectionString

databases:
  - name: wallpaper-estimator-db
    databaseName: wallpaper_estimator
    user: wallpaper_estimator
